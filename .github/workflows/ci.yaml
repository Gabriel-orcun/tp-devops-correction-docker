name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build, test and Sonar
        run: |
          mvn -B verify sonar:sonar \
          -Dsonar.projectKey=Gabriel-orcun_tp-devops-correction-docker \
          -Dsonar.organization=gabriel-orcun \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
          --file simple-api/pom.xml
